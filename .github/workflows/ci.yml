name: CI/CD Pipeline

on:
  push:
    branches: [ master, main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
        exclude:
        - os: windows-latest
          python-version: '3.13'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  test-agents:
    name: Agent Tests (test_agents.py)
    runs-on: ubuntu-latest
    needs: [test]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run agent tests
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        pytest tests/test_agents.py -v --cov=src --cov-report=xml --cov-append

    - name: Upload agent test coverage
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        flags: agent-tests
        name: agent-tests-coverage
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black mypy

    - name: Run Black code formatter check
      run: black --check src tests --line-length 100
      continue-on-error: true

    - name: Run Flake8 linter
      run: flake8 src tests --max-line-length=100 --extend-ignore=E203,W503
      continue-on-error: true

    - name: Run MyPy type checker
      run: mypy src --ignore-missing-imports
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6

    - name: Run Bandit security check
      run: |
        pip install bandit
        bandit -r src/ -f json -o bandit-report.json || true
      continue-on-error: true

  build-docker:
    runs-on: ubuntu-latest
    needs: [test, test-agents, lint]
    
    steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        tags: prism:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  release:
    name: Release v0.1.0
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build distribution packages
      run: python -m build

    - name: Upload dist artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist-${{ github.ref_name }}
        path: dist/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: "PRISM ${{ github.ref_name }}"
        tag_name: ${{ github.ref_name }}
        body: |
          ## PRISM — Pipeline Root-cause Intelligence for Silicon & Media

          Release **${{ github.ref_name }}** — automated build from CI/CD pipeline.

          ### What's included
          - Python wheel and source distribution (`dist/`)
          - Docker image built and validated

          ### Install
          ```bash
          pip install prism-0.1.0-py3-none-any.whl
          ```
        files: dist/*
        draft: false
        prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
